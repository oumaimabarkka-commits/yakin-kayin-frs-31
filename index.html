<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>Carte Fournisseurs Île-de-France</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

#map{
height:600px;
}

.filters{

margin-bottom:15px;
background:#f4f4f4;
padding:10px;
border-radius:5px;

}

input,select{

margin-right:10px;
padding:5px;

}

.header{

display:flex;
align-items:center;
gap:15px;
background:#f8f8f8;
padding:10px;
border-radius:8px;
margin-bottom:10px;

}

.legend{

background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
line-height:23px;

}

#resultats{

font-weight:bold;
margin-left:15px;
color:#2c3e50;

}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" width="100">

<h2>Carte Fournisseurs Île-de-France</h2>

<span id="resultats">
0 fournisseurs
</span>

</div>

<div class="filters">

Fournisseur :

<select id="filtreNom">
<option value="">Tous</option>
</select>

Ville :

<select id="filtreVille">
<option value="">Toutes</option>
</select>

CP :

<select id="filtreCP">
<option value="">Tous</option>
</select>

Produit :

<select id="filtreProduit">
<option value="">Tous</option>
</select>

Distance :

<input
type="range"
id="filtreDistance"
min="0"
max="100"
value="0"
step="5"
>

<span id="distanceValue">
0 km
</span>

<button onclick="filtrer()">
Filtrer
</button>

<button onclick="resetMap()">
Reset
</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>

// MAP

var map=L.map('map').setView([48.85,2.35],10);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{ attribution:'© OpenStreetMap'}

).addTo(map);

var markers=[];

var circle=null;

var fournisseursSet=new Set();
var villesSet=new Set();
var cpsSet=new Set();
var produitsSet=new Set();

// DISTANCE SLIDER

document
.getElementById("filtreDistance")
.addEventListener("input",function(){

document.getElementById(
"distanceValue"
).textContent=this.value+" km";

filtrer();

});

// NORMALIZE

function normalize(str){

return str ?

str.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"")

.trim()

.toLowerCase()

: "";

}

// DISTANCE KM

function distanceKm(lat1,lon1,lat2,lon2){

var R=6371;

var dLat=(lat2-lat1)*Math.PI/180;

var dLon=(lon2-lon1)*Math.PI/180;

var a=

Math.sin(dLat/2)**2+

Math.cos(lat1*Math.PI/180)

*

Math.cos(lat2*Math.PI/180)

*

Math.sin(dLon/2)**2;

return 2*R*Math.atan2(

Math.sqrt(a),

Math.sqrt(1-a)

);

}

// ICONS

function getIcon(color){

return new L.Icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-'+color+'.png',

shadowUrl:
'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',

iconSize:[25,41],

iconAnchor:[12,41]

});

}

var defaultIcon=getIcon("grey");

// COULEURS FOURNISSEURS

var fournisseurIcons={

"Loxam":getIcon("blue"),
"Point P":getIcon("red"),
"Raboni":getIcon("green"),
"Cemex":getIcon("orange"),
"CAUPAMAT CADENZ":getIcon("violet"),
"Tersen":getIcon("yellow"),
"pum":getIcon("black"),
"YPREMA":getIcon("grey"),
"Fransbonhomme":getIcon("blue"),
"BSM":getIcon("red"),
"SODEXTRA":getIcon("green"),
"COLBER":getIcon("orange"),
"SOL 78":getIcon("grey"),
"SPME":getIcon("blue"),
"VIACOV":getIcon("orange"),
"Bouvelot TP":getIcon("black"),
"CHEUTIN":getIcon("violet"),
"GO POMPE":getIcon("green"),
"SNB":getIcon("blue"),
"EVA INDUSTRIES":getIcon("red"),
"EVO LOCATION":getIcon("green"),
"UTD":getIcon("orange"),
"SCIABBARRASI RENT":getIcon("violet"),
"LM DISTRIBUTION":getIcon("yellow"),
"IDF MARQUAGE":getIcon("grey"),
"EUROPIERRE":getIcon("blue"),
"RFM":getIcon("red"),
"ATPL CASELAS":getIcon("green"),
"Resimark":getIcon("orange"),
"Forum-Environnement":getIcon("violet"),
"EUROPEENNE NEGO":getIcon("yellow")

};

// LOAD CSV

fetch("./data.csv")

.then(r=>r.text())

.then(text=>{

Papa.parse(text,{

header:true,

skipEmptyLines:true,

complete:function(results){

results.data.forEach(row=>{

var lat=parseFloat(row.latitude?.replace(",",".")); 
var lng=parseFloat(row.longitude?.replace(",","."));

if(isNaN(lat)) return;

var fournisseur=row.fournisseur?.trim();
var ville=row.ville?.trim();
var cp=row.cp?.trim();
var produit=row.produit?.trim();

if(fournisseur) fournisseursSet.add(fournisseur);
if(ville) villesSet.add(ville);
if(cp) cpsSet.add(cp);
if(produit) produitsSet.add(produit);

var icon=fournisseurIcons[fournisseur]||defaultIcon;

var marker=L.marker(

[lat,lng],

{icon:icon}

)

.addTo(map)

.bindPopup(

"<b>"+fournisseur+"</b><br>"+

ville+"<br>"+

cp+"<br>"+

produit

);

marker.data=row;

markers.push(marker);

});

remplirSelect("filtreNom",fournisseursSet);
remplirSelect("filtreVille",villesSet);
remplirSelect("filtreCP",cpsSet);
remplirSelect("filtreProduit",produitsSet);

filtrer();

}

});

});

// REMPLIR SELECT

function remplirSelect(id,set){

var select=document.getElementById(id);

Array.from(set)

.sort()

.forEach(v=>{

var opt=document.createElement("option");

opt.value=v;

opt.textContent=v;

select.appendChild(opt);

});

}

// FILTRE GLOBAL

function filtrer(){

var nom=normalize(filtreNom.value);
var ville=normalize(filtreVille.value);
var cp=normalize(filtreCP.value);
var produit=normalize(filtreProduit.value);
var distance=filtreDistance.value;

var centre=null;

for(let marker of markers){

if(

ville &&

normalize(marker.data.ville)==ville

){

centre=marker.getLatLng();

break;

}

}

if(circle)
map.removeLayer(circle);

if(centre && distance>0){

circle=L.circle(

centre,

{

radius:distance*1000,
color:'blue',
weight:2,
fill:false

}

).addTo(map);

map.setView(centre,11);

}

var compteur=0;

markers.forEach(marker=>{

var data=marker.data;

var match=true;

if(nom && !normalize(data.fournisseur).includes(nom))
match=false;

if(ville && !normalize(data.ville).includes(ville))
match=false;

if(cp && !normalize(data.cp).includes(cp))
match=false;

if(produit && normalize(data.produit)!=produit)
match=false;

if(centre && distance>0){

var d=distanceKm(

centre.lat,
centre.lng,

marker.getLatLng().lat,
marker.getLatLng().lng

);

if(d>distance)
match=false;

}

if(match){

marker.addTo(map);

compteur++;

}

else{

map.removeLayer(marker);

}

});

document.getElementById("resultats").textContent=

compteur+" fournisseurs trouvés";

}

// RESET

function resetMap(){

location.reload();

}

// LEGENDE

var legend=L.control({position:'bottomright'});

legend.onAdd=function(){

var div=L.DomUtil.create('div','legend');

var fournisseurs = [

"🔵 Loxam","🔴 Point P","🟢 Raboni","🟠 Cemex","🟣 CAUPAMAT CADENZ",
"🟡 Tersen","⚫ pum","⚪ YPREMA","🔵 Fransbonhomme","🔴 BSM",
"🟢 SODEXTRA","🟠 COLBER","🟡 EUROPEENNE NEGO","⚪ SOL 78",
"🔵 SPME","🟠 VIACOV","⚫ Bouvelot TP","🟣 CHEUTIN","🟢 GO POMPE",
"🔵 SNB","🔴 EVA INDUSTRIES","🟢 EVO LOCATION","🟠 UTD",
"🟣 SCIABBARRASI RENT","🟡 LM DISTRIBUTION","⚪ IDF MARQUAGE",
"🔵 EUROPIERRE","🔴 RFM","🟢 ATPL CASELAS","🟠 Resimark",
"🟣 Forum-Environnement"

];

div.innerHTML="<b>Fournisseurs</b><br>";

fournisseurs.forEach(f=>{

var span=document.createElement("span");

span.innerHTML=f+"<br>";

span.onclick=()=>{

filtreNom.value=f.substring(2);

filtrer();

};

div.appendChild(span);

});

return div;

};

legend.addTo(map);

</script>

</body>

</html>
